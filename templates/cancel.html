{% extends "base.html" %}
{% block content %}
<div class="card shadow text-center">
    <div class="card-body">
        <h3>Cancel Booking?</h3>
        <p>Ref: {{ booking.ref }}<br>Movie: {{ booking.movie_title }}<br>Seats: {{ booking.seats }}</p>
        <form method="post" action="/cancel/{{ booking.ref }}/do">
            <button type="submit" class="btn btn-danger">Yes, Cancel</button>
            <a href="/mybookings" class="btn btn-secondary">No</a>
        </form>
    </div>
</div>
{% endblock %}
